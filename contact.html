<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Cake-N-Bake</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>


<header class="header">

<div class="logo-container">
<span class="logo-text">Cake-N-Bake</span>
</div>

<nav>

<ul class="nav">

<li><a href="index.html">Home</a></li>
<li><a href="index.html#store">Store</a></li>
<li><a href="contact.html">Contact</a></li>

</ul>

</nav>

</header>


<!-- HERO -->

<section class="contact-hero">

<div class="contact-hero-content">

<h1>Let's Talk Cake</h1>

<p>Custom cakes, special orders, and bakery inquiries</p>

</div>

</section>


<!-- CONTACT SECTION -->

<section class="contact-container">

<div class="contact-info">

<h2>Visit Our Bakery</h2>

<p>📍 Bangalore, India</p>
<p>📞 +91 9353943827</p>
<p>📧 bakery@email.com</p>

<div class="contact-hours">

<h3>Opening Hours</h3>

<p>Mon-Fri: 9am – 8pm</p>
<p>Sat-Sun: 10am – 9pm</p>

</div>

</div>


<form class="contact-form" id="contact-form">

<h2>Send Message</h2>

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Email Address" required>

<textarea placeholder="Your Message" required></textarea>

<button type="submit">Send Message</button>

<p id="form-message"></p>

</form>

</section>


<script src="js/contact.js"></script>

</body>

</html>
